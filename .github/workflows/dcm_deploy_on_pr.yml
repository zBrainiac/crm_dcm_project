name: DCM Deploy on PR
on:
  pull_request:
    branches: [ main ]
    paths:
      - 'sources/**'
      - 'manifest_dev.yml'
      - 'manifest_prod.yml'
      - '.github/workflows/**'

permissions:
  pull-requests: write

jobs:
  plan:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0

      - name: Fetch Git Repo in Snowflake
        env:
          SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_ROLE: DCM_ADMIN
          SNOWFLAKE_WAREHOUSE: MD_TEST_WH
        run: |
          snow sql -q "ALTER GIT REPOSITORY INTEGRATIONS.GITHUB.CRM_DCM_REPO FETCH;" -x

      - name: Run DCM Plan (DEV)
        env:
          SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_ROLE: DCM_ADMIN
          SNOWFLAKE_WAREHOUSE: MD_TEST_WH
        run: |
          snow sql -q "EXECUTE DCM PROJECT CRM_DEV.PUBLIC.CRM_DCM_DEV PLAN USING CONFIGURATION dev FROM '@INTEGRATIONS.GITHUB.CRM_DCM_REPO/branches/${{ github.head_ref }}/' ;" -x --format json > plan_output.json

      - name: Post Plan as PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('plan_output.json', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '### DCM Plan (DEV)\n```json\n' + plan + '\n```'
            });

  deploy-dev:
    needs: plan
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Snowflake CLI
        uses: snowflakedb/snowflake-cli-action@v2.0

      - name: Fetch Git Repo
        env:
          SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_ROLE: DCM_ADMIN
          SNOWFLAKE_WAREHOUSE: MD_TEST_WH
        run: |
          snow sql -q "ALTER GIT REPOSITORY INTEGRATIONS.GITHUB.CRM_DCM_REPO FETCH;" -x

      - name: Deploy DEV
        env:
          SNOWFLAKE_AUTHENTICATOR: SNOWFLAKE_JWT
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PRIVATE_KEY_RAW: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
          SNOWFLAKE_ROLE: DCM_ADMIN
          SNOWFLAKE_WAREHOUSE: MD_TEST_WH
        run: |
          snow sql -q "EXECUTE DCM PROJECT CRM_DEV.PUBLIC.CRM_DCM_DEV DEPLOY AS \"pr_${{ github.event.pull_request.number }}_${{ github.sha }}\" USING CONFIGURATION dev FROM '@INTEGRATIONS.GITHUB.CRM_DCM_REPO/branches/${{ github.head_ref }}/' ;" -x

      - name: Post Deploy Result as PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### DCM Deploy (DEV) ${status}\nDeployment **${{ job.status }}** for commit \`${{ github.sha }}\` on branch \`${{ github.head_ref }}\`.`
            });
